name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: '是否发布到 GitHub Release'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      release_tag:
        description: '发布版本标签，例如 v1.0.0；publish=true 时必填'
        required: false
        type: string

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0
  NODE_VERSION: '22'
  COPYFILE_DISABLE: '1'

jobs:
  windows:
    name: Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build frontend for tests
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Run Go tests
        run: go test ./...

      - name: Build Windows exe
        run: wails build -platform windows/amd64 -clean -nosyncgomod

      - name: Verify exe format
        shell: pwsh
        run: |
          $exe = "build/bin/cloudflare-tunnel-desktop.exe"
          if (!(Test-Path $exe)) {
            throw "未找到 Windows exe: $exe"
          }

          $bytes = [System.IO.File]::ReadAllBytes($exe)
          $header = [System.Text.Encoding]::ASCII.GetString($bytes[0..1])
          if ($header -ne "MZ") {
            throw "构建产物不是 Windows PE 可执行文件"
          }

      - name: Launch smoke test
        shell: pwsh
        run: |
          $exe = Resolve-Path ".\build\bin\cloudflare-tunnel-desktop.exe"
          $process = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 10

          if ($process.HasExited) {
            throw "exe 启动后过早退出，退出码: $($process.ExitCode)"
          }

          Stop-Process -Id $process.Id -Force

      - name: Prepare Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/bin/cloudflare-tunnel-desktop.exe dist/cloudflare-tunnel-desktop-windows-amd64.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-tunnel-desktop-windows-amd64
          path: dist/cloudflare-tunnel-desktop-windows-amd64.exe
          if-no-files-found: error

  macos:
    name: macOS dmg
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build frontend for tests
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Run Go tests
        run: go test ./...

      - name: Clean extended attributes
        run: |
          xattr -cr build frontend 2>/dev/null || true

      - name: Build macOS app
        run: wails build -platform darwin/arm64 -clean -nosyncgomod

      - name: Create dmg
        run: |
          mkdir -p dist
          hdiutil create \
            -volname "Cloudflare Tunnel Desktop" \
            -srcfolder build/bin/cloudflare-tunnel-desktop.app \
            -ov \
            -format UDZO \
            dist/cloudflare-tunnel-desktop-macos-arm64.dmg
          hdiutil verify dist/cloudflare-tunnel-desktop-macos-arm64.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-tunnel-desktop-macos-arm64
          path: dist/cloudflare-tunnel-desktop-macos-arm64.dmg
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.release_tag }}"
          fi

          if [[ -z "$tag" ]]; then
            echo "publish=true 时必须填写 release_tag" >&2
            exit 1
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){1,2}([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "release_tag 格式不合法: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify release files
        shell: bash
        run: |
          test -f dist/cloudflare-tunnel-desktop-windows-amd64.exe
          test -f dist/cloudflare-tunnel-desktop-macos-arm64.dmg
          shasum -a 256 dist/* > dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --notes "自动构建发布，包含 macOS arm64 dmg 和 Windows amd64 exe。"
          fi
